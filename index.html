<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok Promo Thread Builder</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0f0f0f; color: #fff; padding: 20px; max-width: 800px; margin: auto; }
    h1 { color: #00ff9d; }
    .tweet { background: #1f1f1f; padding: 15px; margin: 15px 0; border-radius: 12px; border-left: 4px solid #00ff9d; }
    textarea { width: 100%; height: 120px; background: #2a2a2a; color: #fff; border: none; border-radius: 8px; padding: 12px; font-size: 16px; }
    button { padding: 10px 16px; margin: 5px; background: #00ff9d; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    button:hover { background: #00cc7a; }
    .actions { margin: 20px 0; }
    .link-btn { background: #1d9bf0; color: white; }
    pre { background: #1f1f1f; padding: 15px; border-radius: 8px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>🚀 Grok Promo Thread Builder</h1>
  <p>Edit your 4-part thread • Save/Load as JSON • Quick launch to schedulers</p>

  <div id="tweets"></div>

  <div class="actions">
    <button onclick="saveJSON()">💾 Save as JSON</button>
    <button onclick="loadJSON()">📂 Load JSON</button>
    <input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleFile(event)">
    <button onclick="copyAll()">📋 Copy All to Clipboard</button>
  </div>

  <div class="actions">
    <button class="link-btn" onclick="launchX()">🐦 Post Thread on X (Manual)</button>
    <button class="link-btn" onclick="launchBuffer()">📅 Open Buffer</button>
    <button class="link-btn" onclick="launchTypefully()">📅 Open Typefully</button>
    <button onclick="exportMarkdown()">📄 Export as Markdown</button>
  </div>

  <script>
    let thread = [
      `Ever feel like you need a smart, always-available thinking partner? 

That's Grok. 

Built by xAI, it's not just another chatbot — it's instant feedback on steroids. Throw ideas at it, and you get thoughtful, truthful responses in seconds. No judgment, no fluff.`,
      
      `One of the best parts? It feels like talking to yourself... but better. 

You can brainstorm, vent, refine arguments, or clarify messy thoughts. It's the ultimate external brain for self-expression.`,
      
      `Perfect for note-taking too. 

Instead of staring at a blank page, you talk it through with Grok. It helps structure your ideas, spot gaps, and turn rambling thoughts into clear notes, essays, or plans.

Game-changer for creators, thinkers, and builders.`,
      
      `Why I keep coming back:
• Lightning-fast, honest feedback
• Remembers context
• Helps you think deeper
• Fun, witty, and actually useful

If you're serious about leveling up your thinking — Grok is the move.

@Grok @xAI

#Grok #xAI #Productivity`
    ];

    function renderTweets() {
      const container = document.getElementById('tweets');
      container.innerHTML = '';
      thread.forEach((text, i) => {
        const div = document.createElement('div');
        div.className = 'tweet';
        div.innerHTML = `
          <strong>Part ${i+1}/4</strong>
          <textarea oninput="updateTweet(${i}, this.value)">${text}</textarea>
          <small>${text.length}/280 characters</small>
        `;
        container.appendChild(div);
      });
    }

    function updateTweet(index, value) {
      thread[index] = value;
    }

    function saveJSON() {
      const dataStr = JSON.stringify(thread, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'grok-promo-thread.json';
      link.click();
    }

    function loadJSON() {
      document.getElementById('fileInput').click();
    }

    function handleFile(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(event) {
        try {
          thread = JSON.parse(event.target.result);
          renderTweets();
          alert('✅ Thread loaded successfully!');
        } catch (err) {
          alert('❌ Invalid JSON file');
        }
      };
      reader.readAsText(file);
    }

    function copyAll() {
      let full = thread.map((t, i) => `${i+1}/ ${t}`).join('\n\n---\n\n');
      navigator.clipboard.writeText(full).then(() => {
        alert('✅ Full thread copied to clipboard!');
      });
    }

    function launchX() {
      alert("Open X → Click compose → Paste each part one by one using '+' for thread");
      window.open('https://x.com/compose', '_blank');
    }

    function launchBuffer() {
      window.open('https://buffer.com', '_blank');
    }

    function launchTypefully() {
      window.open('https://typefully.com', '_blank');
    }

    function exportMarkdown() {
      let md = thread.map((t, i) => `### Part ${i+1}\n\n${t}\n\n---`).join('\n');
      const blob = new Blob([md], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'grok-thread.md';
      link.click();
    }

    // Initialize
    renderTweets();
  </script>
</body>
</html>
